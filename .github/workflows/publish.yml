name: Update data and publish Pages
on:
  push:
    branches: [main]
  schedule:
    # Stagger away from the busiest exact-hour cron boundary.
    - cron: '2-57/10 * * * *'
    - cron: '7-57/10 * * * *'
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: market-sentiment-pages
  cancel-in-progress: false
jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Refresh market data
        run: python scripts/update_data.py
      - name: Validate fresh output
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          d=json.load(open('data/sentiment.json'))
          ts=datetime.fromisoformat(d['generatedAt'])
          age=(datetime.now(timezone.utc)-ts).total_seconds()
          assert age < 300, f'Generated data is stale: {age:.0f}s'
          assert len(d.get('markets',{})) == 5, 'Expected five markets'
          PY
      - name: Build public artifact
        run: |
          mkdir -p _site/data
          cp index.html styles.css app.js .nojekyll _site/
          cp data/sentiment.json _site/data/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
